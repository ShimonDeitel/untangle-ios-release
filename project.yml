name: QuickMath
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  QuickMath:
    type: application
    platform: iOS
    sources:
      - path: QuickMath
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lattice
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: QuickMath/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickMath/QuickMath.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  QuickMathTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuickMathTests
      - path: QuickMath.storekit
    dependencies:
      - target: QuickMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lattice.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  QuickMath:
    build:
      targets:
        QuickMath: all
        QuickMathTests: [test]
    run:
      config: Debug
      storeKitConfiguration: QuickMath.storekit
    test:
      config: Debug
      storeKitConfiguration: QuickMath.storekit
      targets:
        - QuickMathTests
    archive:
      config: Release
