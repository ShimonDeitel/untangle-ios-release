name: Build & Upload (strict manual)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  archive-upload:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST/Contents/Developer"; xcodebuild -version
      - name: Generate project
        run: brew install xcodegen && xcodegen generate
      - name: Write ASC API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: Import cert + profile
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          PROFILE_1_B64: ${{ secrets.PROFILE_1_B64 }}
        run: |
          KCHAIN="$RUNNER_TEMP/b.keychain-db"; KPASS="ci-$RANDOM"
          security create-keychain -p "$KPASS" "$KCHAIN"
          security set-keychain-settings -lut 3600 "$KCHAIN"
          security unlock-keychain -p "$KPASS" "$KCHAIN"
          security list-keychains -d user -s "$KCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$DIST_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/d.p12"
          security import "$RUNNER_TEMP/d.p12" -k "$KCHAIN" -P "$DIST_P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPASS" "$KCHAIN" >/dev/null
          security find-identity -v -p codesigning "$KCHAIN"
          PD="$HOME/Library/MobileDevice/Provisioning Profiles"; mkdir -p "$PD"
          echo "$PROFILE_1_B64" | base64 --decode > "$PD/p1.mobileprovision"
      - name: Archive (strict manual, no auto-provision)
        run: |
          xcodebuild -project QuickMath.xcodeproj -scheme QuickMath -configuration Release \
            -destination 'generic/platform=iOS' -archivePath "$RUNNER_TEMP/QuickMath.xcarchive" \
            CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=W7Q885Q59C \
            PROVISIONING_PROFILE_SPECIFIER="Lattice Dist" CODE_SIGN_IDENTITY="Apple Distribution" \
            archive
      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/EO.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>W7Q885Q59C</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key><dict><key>com.shimondeitel.lattice</key><string>Lattice Dist</string></dict>
            <key>destination</key><string>export</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/QuickMath.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" -exportOptionsPlist "$RUNNER_TEMP/EO.plist"
          ls -la "$RUNNER_TEMP/export"
      - name: Upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
